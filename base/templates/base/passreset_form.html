<!DOCTYPE html>
{% load static %}
{% load crispy_forms_tags %}
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>YellowHead Forms</title>
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
     <!-- bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
   


  <!-- base:css -->
  <link rel="stylesheet" href="{% static 'polluxui/vendors/typicons/typicons.css'%}">
  <link rel="stylesheet" href="{% static 'polluxui/vendors/css/vendor.bundle.base.css'%}">
  <link rel="stylesheet" href=" {% static 'polluxui/css/vertical-layout-light/style.css'%}">
  <link rel="shortcut icon" href="{% static 'img\yhlogo.png'%}" />
</head>
<body>

<div class="content-wrapper">
<div class="container-fluid pt-4 px-4">
  <h3 class="text-left">Password Reset</h3>
  <hr>
  <div class="row g-4">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
     
        <a href="{% url 'home' %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5ZM10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5Z"/>
          </svg>
        </a>
        <!-- General Form Elements -->
        <form method="POST">
            {% csrf_token %}
            {{form|crispy}}
            <input type="submit" name="Send email">
        
        </form>
        
      </div>
    </div>
  </div>
  </div>
</div>
</div>


</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.3/dist/Chart.min.js"></script>
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<!-- base:js -->
<script src=" {% static 'polluxui/vendors/js/vendor.bundle.base.js'%}"></script>
<!-- endinject -->
<!-- Plugin js for this page-->
<script src="  {% static 'polluxui/vendors/chart.js/Chart.min.js'%}"></script>
<!-- End plugin js for this page-->
<!-- inject:js -->
<script src="{% static "polluxui/js/off-canvas.js" %}"></script>
<script src="{% static "polluxui/js/hoverable-collapse.js" %}"></script>
<script src="{% static "polluxui/js/template.js" %}"></script>
<script src="{% static "polluxui/js/settings.js" %}"></script>
<script src="{% static "polluxui/js/todolist.js" %}"></script>
<!-- endinject -->
<!-- Custom js for this page-->
<script src="{% static "polluxui/js/dashboard.js"%}"></script>
<!-- End custom js for this page-->
<script src="https://code.iconify.design/iconify-icon/1.0.2/iconify-icon.min.js"></script>
</body>

</html>
