<!DOCTYPE html>
{% load static %}
{% load crispy_forms_tags %}
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>YellowHead Forms</title>
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
     <!-- bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
   


  <!-- base:css -->
  <link rel="stylesheet" href="{% static 'polluxui/vendors/typicons/typicons.css'%}">
  <link rel="stylesheet" href="{% static 'polluxui/vendors/css/vendor.bundle.base.css'%}">
  <link rel="stylesheet" href=" {% static 'polluxui/css/vertical-layout-light/style.css'%}">
  <link rel="shortcut icon" href="{% static 'img\yhlogo.png'%}" />
</head>
<body>



      <div class="container">
  
    
            <div class="row justify-content-center">
              <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">
  
                <div class="d-flex justify-content-center py-4">
                  <a href="index.html" class="logo d-flex align-items-center w-auto">
                    <img src="assets/img/logo.png" alt="">
                    <span class="d-none d-lg-block">YellowHead Forms</span>
                  </a>
                </div><!-- End Logo -->
  
                <div class="card mb-3">
  
                  <div class="card-body">
  
                    <div class="pt-4 pb-2">
                      <h5 class="card-title text-center pb-0 fs-4">Login to Your Account</h5>
                      <p class="text-center small">Enter your username & password to login</p>
                    </div>
                    <form class="form row g-3" action="" method="POST" >
                      {% csrf_token %}
                      <div class="col-12">
                        <label for="yourUsername" class="form-label">Username</label>
                        <div class="input-group has-validation">
                          <input  id="username" name="username" class="form-control" type="text" placeholder="ronen.." required>
                          <div class="invalid-feedback">Please enter your username.</div>
                        </div>
                      </div>
                      <div class="col-12">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group has-validation">
                        <input type="password" name="password" class="form-control" id="password" required  placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"  />
                        <div class="invalid-feedback">Please enter your password!</div>
                      </div>
  
                      <div class="col-12">
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" name="remember" value="true" id="rememberMe">
                          <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                      </div>
                      <div class="col-12">
                        <button class="btn btn-success primary w-100" type="submit">Login</button>
                      </div>
                   
            
                      <div class="col-12">
                        <p class="small mb-0">Forgot your password ?</p>

                        <a href="{% url 'reset_password' %}" class="btn btn-secondary w-100 active" role="button" aria-disabled="true">Reset Password</a>
                      </div>
                    </form>
  
                  </div>
                </div>
  
  
              </div>
            </div>
          </div>
  
          <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.3/dist/Chart.min.js"></script>
          <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
          <!-- base:js -->
          <script src=" {% static 'polluxui/vendors/js/vendor.bundle.base.js'%}"></script>
          <!-- endinject -->
          <!-- Plugin js for this page-->
          <script src="  {% static 'polluxui/vendors/chart.js/Chart.min.js'%}"></script>
          <!-- End plugin js for this page-->
          <!-- inject:js -->
          <script src="{% static "polluxui/js/off-canvas.js" %}"></script>
          <script src="{% static "polluxui/js/hoverable-collapse.js" %}"></script>
          <script src="{% static "polluxui/js/template.js" %}"></script>
          <script src="{% static "polluxui/js/settings.js" %}"></script>
          <script src="{% static "polluxui/js/todolist.js" %}"></script>
          <!-- endinject -->
          <!-- Custom js for this page-->
          <script src="{% static "polluxui/js/dashboard.js"%}"></script>
          <!-- End custom js for this page-->
          <script src="https://code.iconify.design/iconify-icon/1.0.2/iconify-icon.min.js"></script>
        </body>
        
        </html>
