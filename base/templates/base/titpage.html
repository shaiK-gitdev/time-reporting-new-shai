{% extends  'main.html' %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}

    <div class="content-wrapper">
      <div class="col-md-8">
          <h5 class="mb-2 text-titlecase mb-4">Titles Page</h5>
          <button type="link"  class="btn btn-success"><a href="{% url 'create-tit'%}" style="color:white;">Create Title</a></button>
          <hr>
          <div class="card">
            <div class="table-responsive pt-3">
              <table class="table table-striped project-orders-table">
                <thead>
                  <tr>
                     <th>Title</th>
                     <th>Created</th>
                     <th>Updated</th>
          
                  </tr>
                </thead>
                <tbody>
                  {% for i in titles %}
                  <tr>
                    <td>{{i.name}}</td>
                    <td>{{i.created}}</td>
                    <td>{{i.updated}}</td>
              
                    <td>
                      <div class="d-flex align-items-center" >
                        <button type="button" class="btn btn-success btn-sm btn-icon-text mr-3" >
                            <a href="{% url 'update-tit' i.id %}" style="color : white;">Edit</a>
                          <i class="typcn typcn-edit btn-icon-append"></i>                          
                        </button>
                        <button type="button" class="btn btn-danger btn-sm btn-icon-text">
                            <a href="{% url 'delete-tit' i.id %}" style="color : white;">Delete </a>
                          <i class="typcn typcn-delete-outline btn-icon-append"></i>                          
                        </button>
                      </div>
                    </td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>

   
</div>




  
{% endblock content %}
